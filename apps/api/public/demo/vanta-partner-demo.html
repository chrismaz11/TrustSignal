<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrustSignal x Vanta Demo</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --panel: #ffffff;
        --ink: #10233f;
        --muted: #50637f;
        --accent: #0b5fff;
        --good: #0f8a2c;
        --warn: #9a6a00;
        --bad: #b22727;
      }
      body {
        margin: 0;
        background: radial-gradient(circle at top right, #d9e7ff, var(--bg));
        color: var(--ink);
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      }
      .wrap {
        max-width: 900px;
        margin: 24px auto;
        padding: 0 16px;
      }
      .card {
        background: var(--panel);
        border-radius: 14px;
        box-shadow: 0 6px 22px rgba(19, 44, 89, 0.12);
        padding: 18px;
        margin-bottom: 16px;
      }
      label {
        display: block;
        margin: 8px 0 4px;
        font-weight: 600;
      }
      input, select, textarea, button {
        width: 100%;
        box-sizing: border-box;
        border-radius: 10px;
        border: 1px solid #c6d4ef;
        padding: 10px;
        font-size: 14px;
      }
      button {
        background: var(--accent);
        color: #fff;
        border: 0;
        cursor: pointer;
        margin-top: 10px;
      }
      pre {
        background: #0f1a2d;
        color: #f0f4ff;
        border-radius: 10px;
        padding: 12px;
        overflow: auto;
      }
      .status-pass { color: var(--good); font-weight: 700; }
      .status-review { color: var(--warn); font-weight: 700; }
      .status-fail { color: var(--bad); font-weight: 700; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>TrustSignal + Vanta Integration Demo</h1>
        <p>Demo path uses current TrustSignal API endpoints to simulate a Vanta workflow.</p>
      </div>
      <div class="card">
        <label for="baseUrl">Base URL</label>
        <input id="baseUrl" value="http://localhost:8080" />
        <label for="apiKey">API Key</label>
        <input id="apiKey" placeholder="x-api-key" />
        <label for="bundleId">Bundle ID</label>
        <input id="bundleId" value="vanta-demo-001" />
        <label for="profile">Policy Profile</label>
        <select id="profile">
          <option value="STANDARD_IL">STANDARD_IL</option>
          <option value="HEALTHCARE_US">HEALTHCARE_US</option>
          <option value="LEGAL_US">LEGAL_US</option>
        </select>
        <button id="run">Run Verification Demo</button>
      </div>
      <div class="card">
        <h2>Result</h2>
        <div id="summary"></div>
        <pre id="output">No run yet.</pre>
      </div>
    </div>
    <script>
      const out = document.getElementById('output');
      const summary = document.getElementById('summary');
      document.getElementById('run').addEventListener('click', async () => {
        const baseUrl = document.getElementById('baseUrl').value.trim();
        const apiKey = document.getElementById('apiKey').value.trim();
        const bundleId = document.getElementById('bundleId').value.trim();
        const profile = document.getElementById('profile').value;

        const body = {
          bundleId,
          transactionType: 'DEED_TRANSFER',
          ron: {
            provider: 'DemoRON',
            notaryId: 'NTR-100',
            commissionState: 'IL',
            sealPayload: 'demo-seal'
          },
          doc: {
            docHash: '0x4ce3a69b2cb4854f8f4e9d89e2cb38ce4d9482d937f3418d57a6973012b6e278',
            county: 'Cook',
            state: 'IL',
            parcelId: '17-20-226-014-0000',
            grantor: 'Jane Seller',
            grantee: 'Acme Title LLC'
          },
          policy: { profile }
        };

        try {
          const verifyRes = await fetch(`${baseUrl}/api/v1/verify`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey },
            body: JSON.stringify(body)
          });
          const verifyJson = await verifyRes.json();
          if (!verifyRes.ok) {
            out.textContent = JSON.stringify(verifyJson, null, 2);
            summary.textContent = `Verify failed (${verifyRes.status})`;
            return;
          }

          const receiptId = verifyJson.receiptId;
          const vantaRes = await fetch(`${baseUrl}/api/v1/integrations/vanta/verification/${receiptId}`, {
            headers: { 'x-api-key': apiKey }
          });
          const vantaJson = await vantaRes.json();

          const cls = (vantaJson?.result?.normalizedStatus || '').toLowerCase();
          summary.innerHTML = `Status: <span class="status-${cls}">${vantaJson?.result?.normalizedStatus || 'UNKNOWN'}</span> | Receipt: ${receiptId}`;
          out.textContent = JSON.stringify({ verify: verifyJson, vanta: vantaJson }, null, 2);
        } catch (err) {
          summary.textContent = 'Request failed';
          out.textContent = String(err);
        }
      });
    </script>
  </body>
</html>
