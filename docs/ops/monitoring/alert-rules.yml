groups:
  - name: trustsignal-api-slo-recording
    interval: 30s
    rules:
      - record: trustsignal:api_requests:rate5m
        expr: |
          sum by (job) (rate(trustsignal_http_requests_total{route=~"/api/v1/.*",route!="/api/v1/metrics"}[5m]))

      - record: trustsignal:api_5xx_ratio:rate5m
        expr: |
          sum by (job) (rate(trustsignal_http_requests_total{route=~"/api/v1/.*",route!="/api/v1/metrics",status_code=~"5.."}[5m]))
          /
          clamp_min(sum by (job) (rate(trustsignal_http_requests_total{route=~"/api/v1/.*",route!="/api/v1/metrics"}[5m])), 0.001)

      - record: trustsignal:api_health_success_ratio:rate5m
        expr: |
          sum by (job) (rate(trustsignal_http_requests_total{route="/api/v1/health",status_code=~"2.."}[5m]))
          /
          clamp_min(sum by (job) (rate(trustsignal_http_requests_total{route="/api/v1/health"}[5m])), 0.001)

      - record: trustsignal:api_core_p95_latency_seconds:rate5m
        expr: |
          histogram_quantile(
            0.95,
            sum by (job, le) (
              rate(trustsignal_http_request_duration_seconds_bucket{route=~"^/api/v1/(verify|receipt/:receiptId|receipt/:receiptId/verify)$"}[5m])
            )
          )

      - record: trustsignal:api_traffic_ratio_to_24h_baseline
        expr: |
          sum by (job) (rate(trustsignal_http_requests_total{route=~"/api/v1/.*",route!="/api/v1/metrics"}[5m]))
          /
          clamp_min(sum by (job) (rate(trustsignal_http_requests_total{route=~"/api/v1/.*",route!="/api/v1/metrics"}[24h])), 0.001)

  - name: trustsignal-api-slo-alerts
    interval: 30s
    rules:
      - alert: TrustSignalHealthProbeFailuresSEV2
        expr: |
          (
            sum by (job) (increase(trustsignal_http_requests_total{route="/api/v1/health"}[3m])) >= 3
          )
          and
          (
            sum by (job) (increase(trustsignal_http_requests_total{route="/api/v1/health",status_code=~"2.."}[3m])) == 0
          )
        for: 0m
        labels:
          severity: warning
          incident_severity: SEV-2
          service: trustsignal-api
          slo: availability
        annotations:
          summary: "Health probe failed 3 consecutive checks"
          description: "No successful /api/v1/health checks observed across the last 3 checks for job {{ $labels.job }}. Start SEV-2 triage."
          runbook: "docs/final/10_INCIDENT_ESCALATION_AND_SLO_BASELINE.md"

      - alert: TrustSignalHealthProbeFailuresSEV1
        expr: |
          (
            sum by (job) (increase(trustsignal_http_requests_total{route="/api/v1/health"}[3m])) >= 3
          )
          and
          (
            sum by (job) (increase(trustsignal_http_requests_total{route="/api/v1/health",status_code=~"2.."}[3m])) == 0
          )
        for: 15m
        labels:
          severity: critical
          incident_severity: SEV-1
          service: trustsignal-api
          slo: availability
        annotations:
          summary: "Health probe failure sustained >15m"
          description: "Health failures persisted for 15 minutes for job {{ $labels.job }}. Escalate incident severity to SEV-1 and open stakeholder timeline updates every 30 minutes."
          runbook: "docs/final/10_INCIDENT_ESCALATION_AND_SLO_BASELINE.md"

      - alert: TrustSignalApi5xxRateWarning
        expr: |
          (
            trustsignal:api_5xx_ratio:rate5m > 0.02
          )
          and on (job)
          (
            trustsignal:api_requests:rate5m > 0.10
          )
        for: 10m
        labels:
          severity: warning
          incident_severity: SEV-2
          service: trustsignal-api
          slo: success-ratio
        annotations:
          summary: "5xx rate above 2% for 10m"
          description: "API error-rate warning threshold breached (>2% 5xx) for job {{ $labels.job }}. Investigate core verification and revocation paths."
          runbook: "docs/final/10_INCIDENT_ESCALATION_AND_SLO_BASELINE.md"

      - alert: TrustSignalApi5xxRateCritical
        expr: |
          (
            trustsignal:api_5xx_ratio:rate5m > 0.05
          )
          and on (job)
          (
            trustsignal:api_requests:rate5m > 0.10
          )
        for: 5m
        labels:
          severity: critical
          incident_severity: SEV-2
          service: trustsignal-api
          slo: success-ratio
        annotations:
          summary: "5xx rate above 5% for 5m"
          description: "API error-rate critical threshold breached (>5% 5xx) for job {{ $labels.job }}. Start SEV-2 incident workflow and contain blast radius."
          runbook: "docs/final/10_INCIDENT_ESCALATION_AND_SLO_BASELINE.md"

      - alert: TrustSignalApiCoreP95LatencyWarning
        expr: |
          (
            trustsignal:api_core_p95_latency_seconds:rate5m > 1.0
          )
          and on (job)
          (
            sum by (job) (rate(trustsignal_http_requests_total{route=~"^/api/v1/(verify|receipt/:receiptId|receipt/:receiptId/verify)$"}[5m])) > 0.05
          )
        for: 10m
        labels:
          severity: warning
          incident_severity: SEV-3
          service: trustsignal-api
          slo: latency
        annotations:
          summary: "Core endpoint p95 latency above 1.0s for 10m"
          description: "P95 latency for /api/v1/verify and receipt verification paths exceeded baseline target for job {{ $labels.job }}."
          runbook: "docs/final/10_INCIDENT_ESCALATION_AND_SLO_BASELINE.md"

      - alert: TrustSignalApiCoreP95LatencyCritical
        expr: |
          (
            trustsignal:api_core_p95_latency_seconds:rate5m > 2.5
          )
          and on (job)
          (
            sum by (job) (rate(trustsignal_http_requests_total{route=~"^/api/v1/(verify|receipt/:receiptId|receipt/:receiptId/verify)$"}[5m])) > 0.05
          )
        for: 5m
        labels:
          severity: critical
          incident_severity: SEV-2
          service: trustsignal-api
          slo: latency
        annotations:
          summary: "Core endpoint p95 latency above 2.5s for 5m"
          description: "Critical latency regression on core verification flow for job {{ $labels.job }}. Start SEV-2 incident escalation."
          runbook: "docs/final/10_INCIDENT_ESCALATION_AND_SLO_BASELINE.md"

      - alert: TrustSignalApiTrafficDropBusinessHours
        expr: |
          (
            trustsignal:api_traffic_ratio_to_24h_baseline < 0.30
          )
          and on (job)
          (
            sum by (job) (rate(trustsignal_http_requests_total{route=~"/api/v1/.*",route!="/api/v1/metrics"}[24h])) > 0.10
          )
          and on()
          (
            day_of_week() >= 1 and day_of_week() <= 5 and hour() >= 14 and hour() < 23
          )
        for: 15m
        labels:
          severity: warning
          incident_severity: SEV-3
          service: trustsignal-api
          slo: traffic
        annotations:
          summary: "Traffic volume dropped >70% from 24h baseline"
          description: "Business-hours request volume for job {{ $labels.job }} is below 30% of the 24h baseline for 15m (UTC window 14:00-23:00)."
          runbook: "docs/final/10_INCIDENT_ESCALATION_AND_SLO_BASELINE.md"
