            - name: Cross Model Skill Sync
  # You may pin to the exact commit or the version.
  # uses: chrismaz11/Multi-Model-Skill-Sync@f4188af98f2d960acad17921b40a0ae0efeb3879
  uses: chrismaz11/Multi-Model-Skill-Sync@v1.0.0
  with:
    # Repository root to manage.
    repo-root: # optional, default is .
    # Comma-separated model adapters to validate or refresh.
    target-models: codex, claude, gemini
    # Operation mode: validate or refresh.
    mode: # optional, default is validate
    # Fail the action when drift is detected.
    fail-on-drift: # optional, default is true
    # Path to write the JSON report to, relative to the repository root.
    report-path: # optional, default is .ai/skills/reports/ai-skill-sync-report.json
          
