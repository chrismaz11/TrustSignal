name: Agent — Docs Update

on:
  push:
    branches: [master]
    paths:
      - 'apps/**/*.ts'
      - 'apps/**/*.tsx'
      - 'packages/**/*.ts'
      - 'packages/core/src/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  docs-update:
    runs-on: ubuntu-latest
    steps:
      - uses: warpdotdev/oz-agent-action@v1
        with:
          name: "TrustSignal Docs Update"
          environment: 5EwXuHtNWoZ5J47YaIYFNP
          prompt: |
            A push just landed on master in trustsignal-dev/TrustSignal. Review the diff and update trustsignal-dev/TrustSignal-docs if any of the following changed: /api/v1/* endpoints, receipt schema fields or status labels, auth middleware, registry sources.

            Steps:
            1. Run `git log --oneline -5` and `git diff HEAD~1 HEAD -- apps/ packages/` to see what changed
            2. Clone or fetch trustsignal-dev/TrustSignal-docs and identify affected doc pages
            3. Update only docs that reference changed endpoints, schema, or auth behavior
            4. Open a PR against TrustSignal-docs with a clear title describing what changed

            Rules:
            - Skip: internal refactoring, test-only changes, anything referencing @deed-shield
            - Never document mocked ZK or experimental features as live
            - Status labels must only be: clean, failure, revoked, compliance_gap
            - If nothing doc-worthy changed, exit with "No doc updates needed"
          warp_api_key: ${{ secrets.WARP_API_KEY }}
