name: TrustSignal CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions: read-all

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: '20.18'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: '20.18'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      TRUSTSIGNAL_JWT_SECRET: ${{ secrets.TRUSTSIGNAL_JWT_SECRET }}
      TRUSTSIGNAL_JWT_SECRETS: ${{ secrets.TRUSTSIGNAL_JWT_SECRETS }}
      POLYGON_RPC_URL: ${{ secrets.POLYGON_RPC_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: '20.18'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit/integration tests with coverage
        run: npx vitest run --coverage

  web-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: '20.18'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build releasable web surface
        run: npm --workspace apps/web run build

  signed-receipt-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: trustsignal_signed_receipt_smoke
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d trustsignal_signed_receipt_smoke"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres@127.0.0.1:5432/trustsignal_signed_receipt_smoke?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: '20.18'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Push database schema
        run: cd apps/api && npx prisma db push --skip-generate --accept-data-loss
        env:
          DATABASE_URL: postgresql://postgres@127.0.0.1:5432/trustsignal_signed_receipt_smoke?sslmode=disable

      - name: Create Supabase-managed tables for smoke test
        run: |
          psql postgresql://postgres@127.0.0.1:5432/trustsignal_signed_receipt_smoke <<'SQL'
          CREATE TABLE IF NOT EXISTS public.api_keys (
            id          TEXT PRIMARY KEY DEFAULT gen_random_uuid()::text,
            user_id     TEXT,
            key_hash    TEXT NOT NULL,
            key_prefix  TEXT,
            name        TEXT,
            scopes      TEXT[],
            plan        TEXT NOT NULL DEFAULT 'FREE',
            revoked_at  TIMESTAMPTZ,
            last_used_at TIMESTAMPTZ,
            expires_at  TIMESTAMPTZ,
            created_at  TIMESTAMPTZ NOT NULL DEFAULT now(),
            updated_at  TIMESTAMPTZ NOT NULL DEFAULT now()
          );
          SQL

      - name: Run signed-receipt smoke test
        run: cd apps/api && npx vitest run --config vitest.config.ts src/v2-integration.test.ts

  rust-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: circuits/non_mem_gadget
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Build Halo2 ZKP service
        run: cargo build --release

      - name: Run Halo2 tests
        run: cargo test

      - name: Upload zkp_service binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: zkp_service-linux-x64
          path: circuits/non_mem_gadget/target/release/zkp_service
          if-no-files-found: error
          retention-days: 30

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.24.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Gitleaks scan
        run: gitleaks git . --redact --no-banner

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: '20.18'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  verify-artifact-action:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: '20.18'

      - name: Install action dependencies
        working-directory: github-actions/trustsignal-verify-artifact
        run: npm ci

      - name: Check source syntax
        working-directory: github-actions/trustsignal-verify-artifact
        run: npm run check

      - name: Verify dist alignment
        working-directory: github-actions/trustsignal-verify-artifact
        run: npm run check:dist

      - name: Run local contract tests
        working-directory: github-actions/trustsignal-verify-artifact
        run: npm run test:local
