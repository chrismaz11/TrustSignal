name: Oz Respond to Comment
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  respond:
    if: contains(github.event.comment.body, '@oz-agent')
    runs-on: ubuntu-latest
    steps:
      - uses: warpdotdev/oz-agent-action@v1
        with:
          name: "Oz Agent"
          prompt: |
            A collaborator has tagged you in a comment on this PR or issue.
            Read the comment and fulfill the request.
            Context: This is the TrustSignal evidence integrity API (Fastify + TypeScript + Prisma + Supabase).
            Never remove auth middleware, never add wildcard CORS, never hardcode secrets.
            Commit fixes directly to the PR branch if code changes are needed.
          warp_api_key: ${{ secrets.WARP_API_KEY }}
